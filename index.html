<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Birthday</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&display=swap">
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap">
  <link rel="icon" href="favicon.ico">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>

<body>
  <div id="moodOverlay"></div>

  <div class="hero">
  Happy Birthday, <span class="birthday-name">NIGGA</span> 🤍
</div>

  <div id="stack" class="stack"></div>
  <button id="blowBtn" class="blow-btn" onclick="startCandleFlow()"
    style="display:none;position:fixed;bottom:180px;left:50%;transform:translateX(-50%);padding:14px 28px;border-radius:40px;border:none;background:rgba(255,255,255,.2);backdrop-filter:blur(20px);color:white;font-weight:600;cursor:pointer;">Blow
    Candles 🎂</button>

  <!--  Cake stage -->
  <div id="cakeStage" style="display:none;position:absolute;text-align:center;">
    <div style="font-size:120px">🎂</div>
    <div style="margin-top:10px;font-size:18px">Blow the candles</div>
  </div>

  <div class="dock">
    <div class="icon" onclick="togglePanel('messages', openMessagePanel)">

      <i class="fa-solid fa-envelope"></i>
      <span id="badge" class="badge">4</span>
    </div>
    <div class="icon" onclick="togglePanel('chat', openChatMemory)">
      <i class="fa-solid fa-comment-dots"></i>
      <span id="chatBadge" class="chatBadge">1</span>
    </div>

    <div class="icon" onclick="toggleMusic()">
      <i id="musicIcon" class="fa-solid fa-play" onclick="toggleMusic(event)"></i>
    </div>
    <div class="icon" onclick="togglePanel('memories', openMemories)">
      <i class="fa-solid fa-images"></i>
    </div>
  </div>
  <div id="downBtn" onclick="handleMessageClick()">
    <i class="fa-solid fa-chevron-down"></i>
  </div>

  <span id="chatBadge" class="chatBadge">1</span>

  <div id="iosNotif" class="iosNotif" onclick="openChatFromIOSNotif()">

    <div class="iosLeft">
      <img src="avatar.jpeg">
    </div>

    <div class="iosCenter">
      <div class="iosName">Longsodar</div>
      <div class="iosPreview">Hey… happy birthday ❤️</div>
    </div>

    <div class="iosTime">now</div>

  </div>

  <script src="script.js"></script>
  <div id="stackFocus" class="stack-focus"></div>
</body>

</html>
